<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="p0kks — Personal hub for code, sound, and journal notes.">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://p0kks.me/">

    <meta property="og:image" content="https://p0kks.me/assets/images/p0kks-me-optimized.png">

    <meta name="theme-color" content="#0a0a0a">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://p0kks.me/">

    <title>p0kks — Code, Sound, Journal</title>
    <link rel="icon" type="image/png" href="assets/images/p0kks-me-optimized.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Dependencies -->
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <!-- Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <!-- Header -->
        <header class="header">
            <div class="profile-container">
                <img src="assets/images/p0kks.me-pfp.png" alt="p0kks Profile Picture" class="profile-pfp">
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span>Active</span>
                </div>
            </div>
            <h1 class="profile-name">p0kks</h1>

            
            <!-- Social Icons Row -->
            <div class="social-icons-row" aria-label="Social Links">
                <a href="https://www.youtube.com/@p0kks-yt" class="social-icon-btn" aria-label="YouTube" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z"></path><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon></svg>
                </a>
                <a href="https://twitter.com/p0kks" class="social-icon-btn" aria-label="Twitter" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"></path></svg>
                </a>
                <a href="https://github.com/p0kks" class="social-icon-btn" aria-label="GitHub" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                </a>
                <a href="https://bandlab.com/p0kks" class="social-icon-btn" aria-label="BandLab" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="2.5"></circle><circle cx="17.5" cy="15.5" r="2.5"></circle><path d="M8 17V5l12-2v12"></path></svg>
                </a>
                <a href="https://t.me/p0kks" class="social-icon-btn" aria-label="Telegram" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </a>
            </div>
        </header>



        <!-- Dynamic Content Sections -->
        <section class="content-section" id="journal-section">
            <div class="section-header">Latest Note</div>
            <div id="journal-preview-container" class="issue-list bento-grid">
                <div class="skeleton"></div>
            </div>
            <details class="dropdown-container" id="journal-dropdown" style="display: none;">
                <summary class="dropdown-summary">
                    <div class="section-header">Archive</div>
                    <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </summary>
                <div id="journal-list" class="issue-list bento-grid dropdown-content">
                    <!-- Older items here -->
                </div>
            </details>
        </section>

        <section class="content-section" id="projects-section">
            <details class="dropdown-container">
                <summary class="dropdown-summary">
                    <div class="section-header" style="flex: 1;">Projects</div>
                    <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </summary>
                <div id="projects-list" class="issue-list bento-grid dropdown-content">
                    <div class="skeleton"></div>
                </div>
            </details>
        </section>

        <section class="content-section" id="youtube-section">
            <details class="dropdown-container">
                <summary class="dropdown-summary">
                    <div class="section-header" style="flex: 1;">YouTube Videos</div>
                    <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </summary>
                <div id="youtube-list" class="issue-list bento-grid dropdown-content">
                    <div class="skeleton"></div>
                </div>
            </details>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p class="footer-text">2026 &bull; P0KKS.ME</p>
        </footer>
    </main>


    <!-- Terminal Style Modal -->
    <div id="modal" class="modal-overlay" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <span class="modal-title">p0kks@terminal:~/content$ view</span>
                <button class="modal-close" aria-label="Close modal">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';


            // --- GitHub Content Fetching ---
            const appIssues = new Map();

            const extractExcerpt = (markdown, maxLength) => {
                if (!markdown) return 'No description.';
                let plain = markdown
                    .replace(/#+\s/g, '')
                    .replace(/\*\*(.*?)\*\*/g, '$1')
                    .replace(/\[(.*?)\]\(.*?\)/g, '$1')
                    .replace(/!\[(.*?)\]\(.*?\)/g, '')
                    .replace(/`{1,3}[^`]*`{1,3}/g, '')
                    .replace(/<[^>]*>/g, '')
                    .replace(/\n+/g, ' ')
                    .trim();
                return plain.length > maxLength ? plain.substring(0, maxLength) + '...' : plain;
            };

            const formatMarkdown = (text) => {
                if (typeof marked === 'undefined' || typeof DOMPurify === 'undefined' || typeof hljs === 'undefined') {
                    return '<p>Error loading Markdown parser.</p>';
                }
                marked.setOptions({ 
                    gfm: true, 
                    breaks: true, 
                    highlight: (code, lang) => {
                        const validLanguage = hljs.getLanguage(lang) ? lang : 'plaintext';
                        return hljs.highlight(code, { language: validLanguage }).value;
                    }
                });
                return DOMPurify.sanitize(marked.parse(text), { ADD_ATTR: ['target'] });
            };

            const openModal = (id) => {
                const issue = appIssues.get(id);
                if (!issue) return;
                
                document.getElementById('modal-body').innerHTML = formatMarkdown(issue.body);
                const modal = document.getElementById('modal');
                modal.style.display = 'flex';
                document.body.style.overflow = 'hidden';

                // Enhance links in modal
                document.querySelectorAll('#modal-body a').forEach(a => {
                    a.setAttribute('target', '_blank');
                    a.setAttribute('rel', 'noopener noreferrer');
                });
            };

            const closeModal = () => {
                document.getElementById('modal').style.display = 'none';
                document.body.style.overflow = 'auto';
                setTimeout(() => {
                    document.getElementById('modal-body').innerHTML = ''; // Clear after hide
                }, 200);
            };

            const generateIssueHTML = (issue) => `
                <div class="issue-preview glass-panel" data-id="${issue.id}" tabindex="0" role="button" aria-label="Open ${issue.title}">
                    <h3 class="issue-title">${issue.title}</h3>
                    <div class="issue-meta">
                        <span>${new Date(issue.created_at).toLocaleDateString()}</span>
                        <span class="issue-number">#${issue.number}</span>
                    </div>
                    <p class="issue-excerpt">${extractExcerpt(issue.body, 120)}</p>
                </div>
            `;

            const generateListIssueHTML = (issue) => `
                <div class="issue-list-item glass-panel" data-id="${issue.id}" tabindex="0" role="button" aria-label="Open ${issue.title}">
                    <span class="issue-list-date">${new Date(issue.created_at).toLocaleDateString()}</span>
                    <span class="issue-list-title">${issue.title}</span>
                </div>
            `;

            const loadDynamicContent = async () => {
                const journalPreviewContainer = document.getElementById('journal-preview-container');
                const journalDropdown = document.getElementById('journal-dropdown');
                
                const containers = {
                    journal: document.getElementById('journal-list'),
                    projects: document.getElementById('projects-list')
                };

                try {
                    const response = await fetch('https://api.github.com/repos/P0KKS/p0kks.me/issues?state=open');
                    if (!response.ok) throw new Error('Failed to fetch content');
                    const issues = await response.json();

                    const content = { journal: [], projects: [] };

                    issues.forEach(issue => {
                        appIssues.set(issue.id.toString(), issue);
                        const labels = issue.labels.map(l => l.name.toLowerCase());
                        if (labels.includes('journal')) content.journal.push(issue);
                        else if (labels.includes('projects')) content.projects.push(issue);
                    });

                    // Journal split
                    if (content.journal.length > 0) {
                        journalPreviewContainer.innerHTML = generateIssueHTML(content.journal[0]);
                        if (content.journal.length > 1) {
                            journalDropdown.style.display = 'block';
                            containers.journal.innerHTML = content.journal.slice(1).map(generateListIssueHTML).join('');
                        } else {
                            journalDropdown.style.display = 'none';
                        }
                    } else {
                        journalPreviewContainer.innerHTML = '<p class="footer-text" style="text-align:left">No content available.</p>';
                        journalDropdown.style.display = 'none';
                    }

                    // Projects
                    ['projects'].forEach(key => {
                        const list = content[key];
                        if (list.length > 0) {
                            containers[key].innerHTML = list.map(generateIssueHTML).join('');
                        } else {
                            containers[key].innerHTML = '<p class="footer-text" style="text-align:left">No content available.</p>';
                        }
                    });

                    // Add event listeners securely
                    document.querySelectorAll('.issue-preview, .issue-list-item').forEach(preview => {
                        const handler = () => openModal(preview.getAttribute('data-id'));
                        preview.addEventListener('click', handler);
                        preview.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter' || e.key === ' ') {
                                e.preventDefault();
                                handler();
                            }
                        });
                    });

                } catch (error) {
                    console.error('Content fetch error:', error);
                    journalPreviewContainer.innerHTML = `
                        <div class="issue-preview glass-panel" style="cursor: default;">
                            <p class="issue-excerpt" style="color: var(--accent-color);">Failed to load content.</p>
                        </div>
                    `;
                    Object.values(containers).forEach(container => {
                        if (container) {
                            container.innerHTML = `
                                <div class="issue-preview glass-panel" style="cursor: default;">
                                    <p class="issue-excerpt" style="color: var(--accent-color);">Failed to load content.</p>
                                </div>
                            `;
                        }
                    });
                }
            };

            const loadYouTubeContent = async () => {
                const youtubeContainer = document.getElementById('youtube-list');
                try {
                    const rssUrl = encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=UCcVAouR9U7ndmTOdvMNAL8Q');
                    const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
                    if (!response.ok) throw new Error('Failed to fetch YouTube content');
                    const data = await response.json();
                    
                    if (data.items && data.items.length > 0) {
                        youtubeContainer.innerHTML = data.items.map(video => `
                            <a href="${video.link}" target="_blank" rel="noopener noreferrer" class="issue-preview glass-panel" style="display: block; text-decoration: none;">
                                <h3 class="issue-title" style="margin-bottom: 0.5rem;">${video.title}</h3>
                                <div class="issue-meta">
                                    <span>${new Date(video.pubDate).toLocaleDateString()}</span>
                                    <span class="issue-number" style="background: rgba(255, 0, 0, 0.1); color: #ff4444;">YouTube</span>
                                </div>
                            </a>
                        `).join('');
                    } else {
                        youtubeContainer.innerHTML = '<p class="footer-text" style="text-align:left">No videos available.</p>';
                    }
                } catch (error) {
                    console.error('YouTube fetch error:', error);
                    youtubeContainer.innerHTML = `
                        <div class="issue-preview glass-panel" style="cursor: default;">
                            <p class="issue-excerpt" style="color: var(--accent-color);">Failed to load YouTube videos.</p>
                        </div>
                    `;
                }
            };

            // --- Init ---
            document.addEventListener('DOMContentLoaded', () => {
                
                document.querySelector('.modal-close').addEventListener('click', closeModal);
                window.addEventListener('click', (e) => { if (e.target.id === 'modal') closeModal(); });
                window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

                loadDynamicContent();
                loadYouTubeContent();
            });

        })();
    </script>
</body>
</html>

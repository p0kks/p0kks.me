    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <!-- Header -->
        <header class="header">
            <div class="profile-container">
                <img src="assets/images/p0kks.me-pfp.png" alt="p0kks Profile Picture" class="profile-pfp">

                    <span class="status-dot"></span>
                    <span>Active</span>
                </div>
            </div>
            <h1 class="profile-name">p0kks</h1>

            
            <!-- Social Icons Row -->
            <div class="social-icons-row" aria-label="Social Links">
                <a href="https://www.youtube.com/@p0kks-yt" class="social-icon-btn" aria-label="YouTube" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z"></path><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon></svg>
                </a>
                <a href="https://twitter.com/p0kks" class="social-icon-btn" aria-label="Twitter" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"></path></svg>
                </a>
                <a href="https://github.com/p0kks" class="social-icon-btn" aria-label="GitHub" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                </a>
                <a href="https://bandlab.com/p0kks" class="social-icon-btn" aria-label="BandLab" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="2.5"></circle><circle cx="17.5" cy="15.5" r="2.5"></circle><path d="M8 17V5l12-2v12"></path></svg>
                </a>
                <a href="https://t.me/p0kks" class="social-icon-btn" aria-label="Telegram" target="_blank" rel="noopener noreferrer">

                </a>
            </div>
        </header>



        <!-- Dynamic Content Sections -->
        <section class="content-section" id="journal-section">
            <div class="section-header">Latest Note</div>
            <div id="journal-preview-container" class="issue-list bento-grid">
                <div class="skeleton"></div>
            </div>
            <details class="dropdown-container" id="journal-dropdown" style="display: none;">
                <summary class="dropdown-summary">
                    <div class="section-header">Archive</div>
                    <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </summary>
                <div id="journal-list" class="issue-list bento-grid dropdown-content">
                    <!-- Older items here -->
                </div>
            </details>
        </section>

        <section class="content-section" id="projects-section">
            <details class="dropdown-container">
                <summary class="dropdown-summary">
                    <div class="section-header" style="flex: 1;">Projects</div>
                    <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </summary>
                <div id="projects-list" class="issue-list bento-grid dropdown-content">
                    <div class="skeleton"></div>
                </div>
            </details>
        </section>

        <section class="content-section" id="youtube-section">
            <details class="dropdown-container">
                <summary class="dropdown-summary">
                    <div class="section-header" style="flex: 1;">YouTube Videos</div>
                    <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </summary>
                <div id="youtube-list" class="issue-list bento-grid dropdown-content">
                    <div class="skeleton"></div>
                </div>
            </details>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p class="footer-text">2026 &bull; P0KKS.ME</p>
        </footer>
    </main>


    <!-- Terminal Style Modal -->
    <div id="modal" class="modal-overlay" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <span class="modal-title">p0kks@terminal:~/content$ view</span>
                <button class="modal-close" aria-label="Close modal">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // --- DOM Elements Cache ---
            const els = {
                journalPreview: document.getElementById('journal-preview-container'),
                journalDropdown: document.getElementById('journal-dropdown'),
                journalList: document.getElementById('journal-list'),
                projectsList: document.getElementById('projects-list'),
                youtubeList: document.getElementById('youtube-list'),
                modal: document.getElementById('modal'),
                modalBody: document.getElementById('modal-body'),
                closeBtn: document.querySelector('.modal-close')
            };

            const appIssues = new Map();

            // --- Performance Logging ---
            const logPerf = (label, start) => {
                const duration = performance.now() - start;
                console.log(`[Perf] ${label}: ${duration.toFixed(2)}ms`);
            };

            // --- Security / Sanitization ---
            const escapeHTML = (str) => {
                if (!str) return '';
                return str.replace(/[&<>'"]/g, 
                    tag => ({
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        "'": '&#39;',
                        '"': '&quot;'
                    }[tag] || tag)
                );
            };

            const extractExcerpt = (markdown, maxLength) => {
                if (!markdown) return 'No description.';
                let plain = markdown
                    .replace(/#+\s/g, '')
                    .replace(/\*\*(.*?)\*\*/g, '$1')
                    .replace(/\[(.*?)\]\(.*?\)/g, '$1')
                    .replace(/!\[(.*?)\]\(.*?\)/g, '')
                    .replace(/`{1,3}[^`]*`{1,3}/g, '')
                    .replace(/<[^>]*>/g, '')
                    .replace(/\n+/g, ' ')
                    .trim();
                return escapeHTML(plain.length > maxLength ? plain.substring(0, maxLength) + '...' : plain);
            };

            const formatMarkdown = (text) => {
                if (typeof marked === 'undefined' || typeof DOMPurify === 'undefined' || typeof hljs === 'undefined') {
                    return '<p>Error loading Markdown parser.</p>';
                }
                marked.setOptions({ 
                    gfm: true, 
                    breaks: true, 
                    highlight: (code, lang) => {
                        const validLanguage = hljs.getLanguage(lang) ? lang : 'plaintext';
                        return hljs.highlight(code, { language: validLanguage }).value;
                    }
                });
                return DOMPurify.sanitize(marked.parse(text), { ADD_ATTR: ['target'] });
            };

            // --- Modal Logic ---
            const openModal = (id) => {
                const issue = appIssues.get(id);
                if (!issue) return;
                
                const startRender = performance.now();
                els.modalBody.innerHTML = formatMarkdown(issue.body);
                els.modal.style.display = 'flex';
                document.body.style.overflow = 'hidden';

                // Enhance links in modal
                els.modalBody.querySelectorAll('a').forEach(a => {
                    a.setAttribute('target', '_blank');
                    a.setAttribute('rel', 'noopener noreferrer');
                });
                logPerf('Render Modal', startRender);
            };

            const closeModal = () => {
                els.modal.style.display = 'none';
                document.body.style.overflow = 'auto';
                setTimeout(() => { els.modalBody.innerHTML = ''; }, 200);
            };

            // --- HTML Generators ---
            const generateIssueHTML = (issue) => `
                <div class="issue-preview glass-panel" data-id="${issue.id}" tabindex="0" role="button" aria-label="Open ${escapeHTML(issue.title)}">
                    <h3 class="issue-title">${escapeHTML(issue.title)}</h3>
                    <div class="issue-meta">
                        <span>${new Date(issue.created_at).toLocaleDateString()}</span>
                        <span class="issue-number">#${issue.number}</span>
                    </div>
                    <p class="issue-excerpt">${extractExcerpt(issue.body, 120)}</p>
                </div>
            `;

            const generateListIssueHTML = (issue) => `
                <div class="issue-list-item glass-panel" data-id="${issue.id}" tabindex="0" role="button" aria-label="Open ${escapeHTML(issue.title)}">
                    <span class="issue-list-date">${new Date(issue.created_at).toLocaleDateString()}</span>
                    <span class="issue-list-title">${escapeHTML(issue.title)}</span>
                </div>
            `;

            // --- Fetch & Cache Logic ---
            const fetchWithCache = async (url, cacheKey) => {
                const cached = sessionStorage.getItem(cacheKey);
                if (cached) {
                    try {
                        const parsed = JSON.parse(cached);
                        if (Date.now() - parsed.time < 300000) return parsed.data; // 5 min cache
                    } catch (e) { /* ignore parse error */ }
                }

                const t0 = performance.now();
                const res = await fetch(url);
                logPerf(`Fetch ${cacheKey}`, t0);

                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                
                sessionStorage.setItem(cacheKey, JSON.stringify({ time: Date.now(), data }));
                return data;
            };

            const renderError = (container, message) => {
                container.innerHTML = `
                    <div class="issue-preview glass-panel" style="cursor: default;">
                        <p class="issue-excerpt" style="color: var(--accent-color);">${escapeHTML(message)}</p>
                    </div>
                `;
            };

            const attachListeners = (container) => {
                container.querySelectorAll('.issue-preview, .issue-list-item').forEach(preview => {
                    const handler = () => openModal(preview.getAttribute('data-id'));
                    preview.addEventListener('click', handler);
                    preview.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(); }
                    });
                });
            };

            // --- Content Loaders ---
            const loadJournals = async () => {
                try {
                    const issues = await fetchWithCache('https://api.github.com/repos/P0KKS/p0kks.me/issues?labels=journal&state=open&per_page=100', 'cache_journals');
                    
                    // Defensive filtering
                    const valid = issues.filter(i => i.labels.some(l => l.name.toLowerCase() === 'journal'));
                    valid.forEach(i => appIssues.set(i.id.toString(), i));

                    if (valid.length > 0) {
                        els.journalPreview.innerHTML = generateIssueHTML(valid[0]);
                        if (valid.length > 1) {
                            els.journalDropdown.style.display = 'block';
                            els.journalList.innerHTML = valid.slice(1).map(generateListIssueHTML).join('');
                        } else {
                            els.journalDropdown.style.display = 'none';
                        }
                    } else {
                        els.journalPreview.innerHTML = '<p class="footer-text" style="text-align:left">No journals available.</p>';
                        els.journalDropdown.style.display = 'none';
                    }
                    attachListeners(els.journalPreview);
                    attachListeners(els.journalList);
                } catch (error) {
                    console.error('Journal fetch error:', error);
                    renderError(els.journalPreview, 'Failed to load journal.');
                }
            };

            const loadProjects = async () => {
                try {
                    // Phase 3: Critical Fix - ONLY fetch project label, case-insensitive logic, pagination via per_page=100
                    const issues = await fetchWithCache('https://api.github.com/repos/P0KKS/p0kks.me/issues?labels=project&state=open&per_page=100', 'cache_projects');
                    
                    // Defensive filtering (case-insensitive "project")
                    const valid = issues.filter(i => i.labels.some(l => l.name.toLowerCase() === 'project'));
                    valid.forEach(i => appIssues.set(i.id.toString(), i));

                    if (valid.length > 0) {
                        els.projectsList.innerHTML = valid.map(generateIssueHTML).join('');
                    } else {
                        els.projectsList.innerHTML = '<p class="footer-text" style="text-align:left">No projects available.</p>';
                    }
                    attachListeners(els.projectsList);
                } catch (error) {
                    console.error('Projects fetch error:', error);
                    renderError(els.projectsList, 'Failed to load projects.');
                }
            };

            const loadYouTubeContent = async () => {
                try {
                    const rssUrl = encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=UCcVAouR9U7ndmTOdvMNAL8Q');
                    const data = await fetchWithCache(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`, 'cache_youtube');
                    
                    if (data.items && data.items.length > 0) {
                        els.youtubeList.innerHTML = data.items.map(video => `
                            <a href="${escapeHTML(video.link)}" target="_blank" rel="noopener noreferrer" class="issue-preview glass-panel" style="display: block; text-decoration: none;">
                                <h3 class="issue-title" style="margin-bottom: 0.5rem;">${escapeHTML(video.title)}</h3>
                                <div class="issue-meta">
                                    <span>${new Date(video.pubDate).toLocaleDateString()}</span>
                                    <span class="issue-number" style="background: rgba(255, 0, 0, 0.1); color: #ff4444;">YouTube</span>
                                </div>
                            </a>
                        `).join('');
                    } else {
                        els.youtubeList.innerHTML = '<p class="footer-text" style="text-align:left">No videos available.</p>';
                    }
                } catch (error) {
                    console.error('YouTube fetch error:', error);
                    renderError(els.youtubeList, 'Failed to load YouTube videos.');
                }
            };

            // --- Performance & Lifecycle ---
            const handleVisibility = () => {
                if (document.hidden) {
                    document.body.classList.add('animations-paused');
                } else {
                    document.body.classList.remove('animations-paused');
                }
            };

            // Throttle function for scroll
            const throttle = (fn, wait) => {
                let time = Date.now();
                return () => {
                    if ((time + wait - Date.now()) < 0) {
                        fn();
                        time = Date.now();
                    }
                };
            };

            const onScroll = throttle(() => {
                // Future scroll handling
            }, 100);

            // --- Init ---
            document.addEventListener('DOMContentLoaded', () => {
                els.closeBtn.addEventListener('click', closeModal);
                window.addEventListener('click', (e) => { if (e.target === els.modal) closeModal(); });
                window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
                
                document.addEventListener('visibilitychange', handleVisibility);
                window.addEventListener('scroll', onScroll, { passive: true });

                const startRender = performance.now();
                Promise.all([loadJournals(), loadProjects(), loadYouTubeContent()]).then(() => {
                    logPerf('Total App Render', startRender);
                });
            });

        })();
    </script>
</body>
